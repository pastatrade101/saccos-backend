services:
  backend:
    ports: []

  api-lb:
    image: nginx:1.27-alpine
    depends_on:
      backend:
        condition: service_started
    ports:
      - "${PORT:-5000}:5000"
    volumes:
      - ./deploy/nginx/api-lb.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
